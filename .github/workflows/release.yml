name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      # WinUI publish needs the MSIX/PRI packaging tasks from Visual Studio's MSBuild.
      - uses: microsoft/setup-msbuild@v2

      - name: Derive version
        id: ver
        shell: pwsh
        run: echo "version=$($env:GITHUB_REF_NAME.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      # dotnet restore (not msbuild -t:Restore) actually downloads the self-contained
      # win-x64 runtime pack; msbuild -t:Publish below reuses it from the NuGet cache.
      - name: Restore WinUI app
        run: dotnet restore src/ProxiFyre.UI/ProxiFyre.UI.csproj -r win-x64

      # PublishDir is interpreted relative to the PROJECT dir, so a bare `publish\`
      # lands in src/ProxiFyre.UI/publish. Use an absolute repo-root path so the
      # app, the ProxiFyre.exe download, and the installer all agree on `publish\`.
      - name: Publish WinUI app (self-contained x64)
        run: >
          msbuild src/ProxiFyre.UI/ProxiFyre.UI.csproj -t:Publish
          -p:Configuration=Release -p:Platform=x64 -p:RuntimeIdentifier=win-x64
          -p:SelfContained=true -p:WindowsAppSDKSelfContained=true
          -p:PublishDir=${{ github.workspace }}\publish\

      # msbuild -t:Publish generates the app resource index (ProxiFyre.UI.pri) in bin\
      # but does NOT copy it to the publish dir — only the framework PRIs get copied.
      # Without the app's resources.pri next to the exe, MRT can't resolve WinUI theme
      # resources at runtime, so the first {ThemeResource} use throws XamlParseException
      # and the main window never opens. Copy it in as resources.pri (the name the
      # unpackaged WinUI runtime auto-loads from the app directory).
      - name: Include app resources.pri
        shell: pwsh
        run: |
          $pri = Get-ChildItem -Path src/ProxiFyre.UI/bin -Recurse -Filter ProxiFyre.UI.pri |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $pri) { throw "app PRI (ProxiFyre.UI.pri) not found under bin" }
          $dest = Join-Path "${{ github.workspace }}\publish" "resources.pri"
          Copy-Item $pri.FullName $dest -Force
          Write-Host "Copied $($pri.FullName) -> $dest"

      # Bundle ProxiFyre.exe: resolve the latest x64 asset dynamically (asset name is
      # version-stamped, e.g. ProxiFyre-v2.2.1-x64-signed.zip).
      - name: Download ProxiFyre binary
        shell: pwsh
        run: |
          $rel = Invoke-RestMethod "https://api.github.com/repos/wiresock/proxifyre/releases/latest" `
            -Headers @{ 'User-Agent' = 'proxyfyre-gui-ci' }
          $asset = $rel.assets | Where-Object { $_.name -like '*x64*signed.zip' } | Select-Object -First 1
          if (-not $asset) { throw "No x64 ProxiFyre asset found" }
          Write-Host "Downloading $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile proxifyre.zip
          Expand-Archive proxifyre.zip -DestinationPath publish -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\proxifyre-ui.iss

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
