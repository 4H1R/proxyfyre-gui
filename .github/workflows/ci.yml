name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore ProxiFyre.sln
      - name: Build Core + Tests
        run: dotnet build tests/ProxiFyre.Core.Tests/ProxiFyre.Core.Tests.csproj -c Release --no-restore
      - name: Test
        run: dotnet test tests/ProxiFyre.Core.Tests/ProxiFyre.Core.Tests.csproj -c Release --no-build --verbosity normal
  build-ui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore WinUI app
        run: dotnet restore src/ProxiFyre.UI/ProxiFyre.UI.csproj -r win-x64
      - name: Build WinUI app
        run: dotnet build src/ProxiFyre.UI/ProxiFyre.UI.csproj -c Release -p:Platform=x64 --no-restore
