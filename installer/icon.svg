<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0ea5a4"/>
    </linearGradient>
  </defs>
  <!-- rounded badge -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#bg)"/>
  <!-- routing path: client -> proxy hop -> destination -->
  <g fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <path d="M64 168 L64 112 L192 112"/>
  </g>
  <!-- arrow head at destination -->
  <path d="M192 112 L164 90 L164 134 Z" fill="#ffffff"/>
  <!-- client node -->
  <circle cx="64" cy="168" r="20" fill="#ffffff"/>
  <circle cx="64" cy="168" r="9" fill="#2563eb"/>
  <!-- proxy hop node -->
  <circle cx="64" cy="112" r="14" fill="#bbf7f0"/>
</svg>
